  - generic [ref=e45]:
    - generic [ref=e46]: The discipline
    - heading "Four invariants the runtime enforces by construction." [level=2] [ref=e47]
    - paragraph [ref=e48]: Most "AI safety" tooling layers checks on top of generation. Orc inverts that — the architecture makes failure modes structurally impossible, not just unlikely.
    - generic [ref=e49]:
      - generic [ref=e50]:
        - generic [ref=e51]: 01 — Citations
        - heading "Cannot fabricate sources." [level=3] [ref=e52]
        - paragraph [ref=e53]: Every chunk ID Orc returns is validated against the actual retrieval set. Hallucinated citations are dropped before the verdict reaches you. The model is structurally prevented from inventing a source.
      - generic [ref=e54]:
        - generic [ref=e55]: 02 — Architecture
        - heading "Stateless skills, durable context." [level=3] [ref=e56]
        - paragraph [ref=e57]: Skills are pure functions with explicit input/output contracts. No agent identities, no persistent personas, no emergent coordination. Persistence lives in the workspace — not in the agents — so behavior is auditable and reproducible.
      - generic [ref=e58]:
        - generic [ref=e59]: 03 — Replay
        - heading "Every run is reconstructable." [level=3] [ref=e60]
        - paragraph [ref=e61]:
          - text: "Every CLI or MCP call writes a trace: retrieval set, every LLM call's tokens and cache hits, the structured output."
          - code [ref=e62]: orc replay <run_id>
          - text: re-executes the exact decision against the same corpus snapshot. Months later. Same answer. Same evidence.
      - generic [ref=e63]:
        - generic [ref=e64]: 04 — Approval
        - heading "Analysis ≠ action." [level=3] [ref=e65]
        - paragraph [ref=e66]: Anything that would mutate the outside world lands in the approval queue first. Humans accept or reject with a note. Write paths run as separate processes with separate tokens. The blast radius of a compromised agent is, by design, zero.
  - generic [ref=e68]:
    - generic [ref=e69]: How it works
    - heading "A workspace. A corpus. A claim. Receipts." [level=2] [ref=e70]:
      - text: A workspace. A corpus. A claim.
      - emphasis [ref=e71]: Receipts.
    - paragraph [ref=e72]:
      - text: The whole loop in four commands. Storage is local SQLite under
      - code [ref=e73]: ~/.orc/
      - text: . Bring your own Anthropic key, OpenRouter key, or local model. The CLI is the same surface other agents see through MCP.
    - generic [ref=e74]:
      - generic [ref=e79]: ~/orc — the four-step loop
      - generic [ref=e80]: "# 1. A workspace is a trust boundary. One per matter, project, or topic. $ orc workspace create research Created workspace research # 2. Ingest evidence: files, directories, or URLs. Markdown, txt, json. $ orc ingest ./notes -w research $ orc ingest https://www.anthropic.com/engineering/multi-agent-research-system -w research Ingested 14 evidence items into research # 3. Verify any claim. Or pipe a whole draft through. $ orc verify --file draft.md -w research --yes 7 claims extracted from draft.md. Verifying... 1. supported (0.92) Anthropic released the Skills API in October 2025 2. partial (0.71) The multi-agent eval delta was 90.2% 3. supported (0.88) Prompt caching has a 5-minute ephemeral TTL by default 4. contradicted (0.95) Multi-agent setups always outperform single-agent 5. supported (0.86) Skills are versioned, auditable capabilities 6. not_found (0.90) Anthropic was acquired by Microsoft in 2026 7. supported (0.94) Tool use is more reliable than JSON-mode for structured output # 4. Inspect, replay, or approve any decision later. $ orc trace show 01KR1NH... $ orc replay 01KR1NH... --live"
