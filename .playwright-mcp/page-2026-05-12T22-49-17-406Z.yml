        - generic [ref=e88]: Pre-publish
        - heading "Fact-check your own writing." [level=3] [ref=e89]
        - paragraph [ref=e90]: Ingest your published catalog. Run every draft through Orc before you ship. Catches self-contradiction with prior work, fabricated statistics, and citations that don't say what you assumed.
        - generic [ref=e91]: orc verify --file draft.md -w aiwth
      - generic [ref=e92]:
        - generic [ref=e93]: Audit
        - heading "Verify what others claim." [level=3] [ref=e94]
        - paragraph [ref=e95]: A critique arrives with confident statistics and made-up citations. Ingest your trusted sources. Orc tells you which claims are supported, contradicted, or not in the corpus — with the exact quote next to each verdict.
        - generic [ref=e96]: orc verify "the claim" -w trusted
      - generic [ref=e97]:
        - generic [ref=e98]: Regulated
        - heading "Where audit trails matter." [level=3] [ref=e99]
        - paragraph [ref=e100]: Legal briefs. Compliance memos. Financial disclosures. Medical literature reviews. The trace + replay + structurally-bounded citations are the deployment posture regulated industries actually need.
        - generic [ref=e101]: orc trace show <run_id> → defensible
