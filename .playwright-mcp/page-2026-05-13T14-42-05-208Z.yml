  - generic [ref=e86]:
    - generic [ref=e87]: The discipline
    - heading "Four invariants the runtime enforces by construction." [level=2] [ref=e88]
    - paragraph [ref=e89]: Most "AI safety" tooling layers checks on top of generation. Orc inverts that — the architecture makes failure modes structurally impossible, not just unlikely.
    - generic [ref=e90]:
      - generic [ref=e91]:
        - generic [ref=e92]: 01 — Citations
        - heading "Cannot fabricate sources." [level=3] [ref=e93]
        - paragraph [ref=e94]: Every chunk ID Orc returns is validated against the actual retrieval set. Hallucinated citations are dropped before the verdict reaches you. The model is structurally prevented from inventing a source.
      - generic [ref=e95]:
        - generic [ref=e96]: 02 — Architecture
        - heading "Stateless skills, durable context." [level=3] [ref=e97]
        - paragraph [ref=e98]: Skills are pure functions with explicit input/output contracts. No agent identities, no persistent personas, no emergent coordination. Persistence lives in the workspace — not in the agents — so behavior is auditable and reproducible.
      - generic [ref=e99]:
        - generic [ref=e100]: 03 — Replay
        - heading "Every run is reconstructable." [level=3] [ref=e101]
        - paragraph [ref=e102]:
          - text: "Every CLI or MCP call writes a trace: retrieval set, every LLM call's tokens and cache hits, the structured output."
          - code [ref=e103]: orc replay <run_id>
          - text: re-executes the exact decision against the same corpus snapshot. Months later. Same answer. Same evidence.
      - generic [ref=e104]:
        - generic [ref=e105]: 04 — Approval
        - heading "Analysis ≠ action." [level=3] [ref=e106]
        - paragraph [ref=e107]: Anything that would mutate the outside world lands in the approval queue first. Humans accept or reject with a note. Write paths run as separate processes with separate tokens. The blast radius of a compromised agent is, by design, zero.
  - generic [ref=e109]:
    - generic [ref=e110]: How it works
    - heading "A workspace. A corpus. A claim. Receipts." [level=2] [ref=e111]:
      - text: A workspace. A corpus. A claim.
      - emphasis [ref=e112]: Receipts.
    - paragraph [ref=e113]:
      - text: The whole loop in four commands. Storage is local SQLite under
