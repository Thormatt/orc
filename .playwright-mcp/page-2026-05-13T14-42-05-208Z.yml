  - generic [ref=e236]:
    - generic [ref=e237]: The moat
    - heading "Capability scaling eats cleverness. It doesn't eat discipline." [level=2] [ref=e238]:
      - text: Capability scaling eats cleverness.
      - emphasis [ref=e239]: It doesn't eat discipline.
    - paragraph [ref=e240]:
      - text: Anything that's clever today gets absorbed into the next model. So Orc bets on the things that
      - emphasis [ref=e241]: don't
      - text: erode when GPT-6 or Claude 5 ships. Each one of these gets
      - emphasis [ref=e242]: more
      - text: valuable as raw capability rises — because the gap between "capable model" and "defensible deployment" widens with every new frontier release.
    - generic [ref=e243]:
      - generic [ref=e244]:
        - generic [ref=e245]: Moat 01
        - heading "Owned evidence compounds." [level=3] [ref=e246]
        - paragraph [ref=e247]: Bigger models don't know your firm's matters, your published catalog, your meter data, your client documents. The corpus is your asset, and the verification quality grows with what you ingest — not with the model vendor's roadmap.
      - generic [ref=e248]:
        - generic [ref=e249]: Moat 02
        - heading "Structural impossibility, not prompt mitigation." [level=3] [ref=e250]
        - paragraph [ref=e251]: Hallucinated citations aren't prevented by asking the model nicely. They're prevented because the data structure refuses to return chunk IDs that don't exist in retrieval. That guarantee doesn't depend on the model getting smarter — it's an architectural choice.
      - generic [ref=e252]:
        - generic [ref=e253]: Moat 03
        - heading "Audit infrastructure is engineering, not intelligence." [level=3] [ref=e254]
        - paragraph [ref=e255]: Trace + replay are operational discipline. Any AI system deployed in a regulated workflow needs them. Most tooling skips them. The gap is engineering investment, not model capability — frontier scaling doesn't close it.
      - generic [ref=e256]:
        - generic [ref=e257]: Moat 04
        - heading "Blast-radius bounded by construction." [level=3] [ref=e258]
        - paragraph [ref=e259]: Write paths run in separate processes with separate tokens. Approval queues sit between analysis and action. Even as agents become more capable, the maximum damage from a compromised or hijacked agent stays at zero. That's a contract, not a precaution.
      - generic [ref=e260]:
        - generic [ref=e261]: Moat 05
        - heading "Directives compound across verticals." [level=3] [ref=e262]
        - paragraph [ref=e263]: Research today. Legal next. Marketing analytics after that. Each new directive shares the same primitives — skills, traces, verification, approvals — and the deployment surface grows without diluting the architecture. Each customer's directive library is theirs.
      - generic [ref=e264]:
        - generic [ref=e265]: Moat 06
        - heading "Switching costs once deployed." [level=3] [ref=e266]
        - paragraph [ref=e267]: Once a team's traces, approval history, and curated corpus live in Orc, replacing it means losing months of accumulated audit material and tuned verification. That's not lock-in by feature gating — it's lock-in by the value of what you've already built inside.
    - blockquote [ref=e268]:
      - text: "\"The version that wins is narrow, deep, instrumented, and evidence-bound.\""
      - generic [ref=e269]: — from the Orc reference architecture
