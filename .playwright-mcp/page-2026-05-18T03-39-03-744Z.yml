          - paragraph [ref=e277]:
            - text: Orc itself is
            - strong [ref=e278]: not
            - text: a "high-risk AI system" per Annex III. It is a tool used by deployers and providers of high-risk systems. Article 12/13/14 obligations strictly fall on the deployer; Orc supplies the machinery to meet them. Buyer-side legal counsel should always confirm your specific obligations.
          - generic [ref=e279]:
            - generic [ref=e280]: also out of scope, marked honestly
            - generic [ref=e281]: Conformity assessment under Article 43 is a procedural obligation, not a tool output. SOC 2 Type II and ISO/IEC 42001 attestations are on the Phase 4 roadmap; Orc v0.1.0 is open-source, MIT-licensed, fully inspectable code — a different (and arguably stronger) form of trust than a certificate, but not equivalent. General-purpose AI obligations under Articles 51–56 apply to the underlying LLM provider (Anthropic, OpenAI via OpenRouter), not to Orc itself.
