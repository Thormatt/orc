  - generic [ref=e46]:
    - generic [ref=e47]: The discipline
    - heading "Four invariants the runtime enforces by construction." [level=2] [ref=e48]
    - paragraph [ref=e49]: Most "AI safety" tooling layers checks on top of generation. Orc inverts that — the architecture makes failure modes structurally impossible, not just unlikely.
    - generic [ref=e50]:
      - generic [ref=e51]:
        - generic [ref=e52]: 01 — Citations
        - heading "Cannot fabricate sources." [level=3] [ref=e53]
        - paragraph [ref=e54]: Every chunk ID Orc returns is validated against the actual retrieval set. Hallucinated citations are dropped before the verdict reaches you. The model is structurally prevented from inventing a source.
      - generic [ref=e55]:
        - generic [ref=e56]: 02 — Architecture
        - heading "Stateless skills, durable context." [level=3] [ref=e57]
        - paragraph [ref=e58]: Skills are pure functions with explicit input/output contracts. No agent identities, no persistent personas, no emergent coordination. Persistence lives in the workspace — not in the agents — so behavior is auditable and reproducible.
      - generic [ref=e59]:
        - generic [ref=e60]: 03 — Replay
        - heading "Every run is reconstructable." [level=3] [ref=e61]
        - paragraph [ref=e62]:
          - text: "Every CLI or MCP call writes a trace: retrieval set, every LLM call's tokens and cache hits, the structured output."
          - code [ref=e63]: orc replay <run_id>
          - text: re-executes the exact decision against the same corpus snapshot. Months later. Same answer. Same evidence.
      - generic [ref=e64]:
        - generic [ref=e65]: 04 — Approval
        - heading "Analysis ≠ action." [level=3] [ref=e66]
        - paragraph [ref=e67]: Anything that would mutate the outside world lands in the approval queue first. Humans accept or reject with a note. Write paths run as separate processes with separate tokens. The blast radius of a compromised agent is, by design, zero.
  - generic [ref=e69]:
    - generic [ref=e70]: How it works
    - heading "A workspace. A corpus. A claim. Receipts." [level=2] [ref=e71]:
      - text: A workspace. A corpus. A claim.
      - emphasis [ref=e72]: Receipts.
    - paragraph [ref=e73]:
      - text: The whole loop in four commands. Storage is local SQLite under
      - code [ref=e74]: ~/.orc/
      - text: . Bring your own Anthropic key, OpenRouter key, or local model. The CLI is the same surface other agents see through MCP.
    - generic [ref=e75]:
      - generic [ref=e80]: ~/orc — the four-step loop
      - generic [ref=e81]: "# 1. A workspace is a trust boundary. One per matter, project, or topic. $ orc workspace create research Created workspace research # 2. Ingest evidence: files, directories, or URLs. Markdown, txt, json. $ orc ingest ./notes -w research $ orc ingest https://www.anthropic.com/engineering/multi-agent-research-system -w research Ingested 14 evidence items into research # 3. Verify any claim. Or pipe a whole draft through. $ orc verify --file draft.md -w research --yes 7 claims extracted from draft.md. Verifying... 1. supported (0.92) Anthropic released the Skills API in October 2025 2. partial (0.71) The multi-agent eval delta was 90.2% 3. supported (0.88) Prompt caching has a 5-minute ephemeral TTL by default 4. contradicted (0.95) Multi-agent setups always outperform single-agent 5. supported (0.86) Skills are versioned, auditable capabilities 6. not_found (0.90) Anthropic was acquired by Microsoft in 2026 7. supported (0.94) Tool use is more reliable than JSON-mode for structured output # 4. Inspect, replay, or approve any decision later. $ orc trace show 01KR1NH... $ orc replay 01KR1NH... --live"
  - generic [ref=e83]:
    - generic [ref=e84]: A real example
    - heading "One critique. Seven claims. Thirty seconds." [level=2] [ref=e85]:
      - text: One critique. Seven claims.
      - emphasis [ref=e86]: Thirty seconds.
    - paragraph [ref=e87]: "A long critique lands in your inbox: seven confident-sounding claims, four citations, three specific statistics. Two citations look real. One date doesn't match what you remember. Before Orc, you spend an hour Googling — half of it inconclusive. Now you do this:"
    - generic [ref=e88]:
      - generic [ref=e93]: ~/orc — auditing a 7-claim critique against trusted sources
      - generic [ref=e94]: "$ orc workspace create critique-audit $ orc ingest https://www.anthropic.com/engineering/multi-agent-research-system -w critique-audit $ orc ingest ./trusted-papers -w critique-audit Ingested 14 evidence items. $ orc verify --file critique.md -w critique-audit --yes 7 claims extracted from critique.md. Verifying... 1. supported (0.92) Multi-agent eval delta of 90.2% was reported by Anthropic 2. supported (0.88) Self-MoA paper exists and reports the cited benchmark 3. contradicted (0.95) The cited paper argues the OPPOSITE conclusion 4. not_found (0.97) No paper titled \"ReliabilityBench\" exists in the corpus 5. not_found (0.93) Cited date does not match the source's actual timeline 6. supported (0.90) Prompt caching has a 5-minute ephemeral TTL by default 7. partial (0.71) Claim is broader than the corpus supports Summary: supported=3 partial=1 contradicted=1 not_found=2 Cost: $0.06 · Elapsed: 31s · Trace: 01KR8..."
    - paragraph [ref=e95]:
      - text: The two
      - code [ref=e96]: not_found
      - text: verdicts? One is a fabricated paper title. The other is a real paper attributed to the wrong year. The
      - code [ref=e97]: contradicted
      - text: claim cites a real paper that argues the opposite of what the critique implies. You reply with three specific corrections, each with chunk-level citations from the actual sources. The author concedes.
    - paragraph [ref=e98]:
      - text: You save the article you'd have written if you'd taken the critique at face value.
      - strong [ref=e99]: "Total cost: $0.06. Time: under a minute. Credibility: preserved."
