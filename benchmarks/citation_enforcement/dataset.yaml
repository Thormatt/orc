# Citation-enforcement benchmark dataset.
#
# Each case is (claim, fakes). The benchmark runner:
#   1. retrieves real chunks for the claim,
#   2. has the fake LLM return verdict.supporting_chunk_ids = real_ids[:n_real] + fakes
#   3. measures whether any fakes survive the chunk_id validation step in
#      verify_claim.py.
#
# Fakes are deliberately plausible — same ULID-ish prefix, same length, but
# generated for this dataset so they can never appear in any real retrieval.
# n_real defaults to 2; override per-case if a claim should retrieve fewer.

cases:
  - claim: "Orc workspaces are stored under ~/.orc/workspaces/<name>/."
    fakes:
      - 01KFAKEXM8TQNMN5KAHTKYMXK01
      - 01KFAKEXM8TQNMN5KAHTKYMXK02
      - 01KFAKEXM8TQNMN5KAHTKYMXK03
  - claim: "Every orc verify run writes a full trace JSON to disk."
    fakes:
      - 01KFAKE4PV6Z3WB8YQ7BENCH001
      - 01KFAKE4PV6Z3WB8YQ7BENCH002
      - 01KFAKE4PV6Z3WB8YQ7BENCH003
  - claim: "BM25 retrieval is the default in orc."
    fakes:
      - 01KFAKE8Z3M2KFR0YV9CITATION1
      - 01KFAKE8Z3M2KFR0YV9CITATION2
      - 01KFAKE8Z3M2KFR0YV9CITATION3
  - claim: "Hallucinated chunk_ids returned by the model are dropped before the verdict reaches the caller."
    fakes:
      - 01KFAKEZZZZZZZZZZHALLUC001
      - 01KFAKEZZZZZZZZZZHALLUC002
      - 01KFAKEZZZZZZZZZZHALLUC003
  - claim: "Orc supports MCP via a stdio server."
    fakes:
      - 01KFAKEABCDEF1234567MCP0001
      - 01KFAKEABCDEF1234567MCP0002
      - 01KFAKEABCDEF1234567MCP0003
  - claim: "The directive registry maps names to skill specs."
    fakes:
      - 01KFAKE99887766DIRECTIVE001
      - 01KFAKE99887766DIRECTIVE002
      - 01KFAKE99887766DIRECTIVE003
  - claim: "Markdown, text, and URL ingestion are supported."
    fakes:
      - 01KFAKE55443322INGEST00001
      - 01KFAKE55443322INGEST00002
      - 01KFAKE55443322INGEST00003
  - claim: "verify_claim returns a structured verdict with confidence."
    fakes:
      - 01KFAKE11223344VERIFY00001
      - 01KFAKE11223344VERIFY00002
      - 01KFAKE11223344VERIFY00003
  - claim: "Replay can run in frozen mode against a corpus version."
    fakes:
      - 01KFAKE66778899REPLAY00001
      - 01KFAKE66778899REPLAY00002
      - 01KFAKE66778899REPLAY00003
  - claim: "An approval queue gates external actions in orc."
    fakes:
      - 01KFAKEAPPROVAL11111QUEUE01
      - 01KFAKEAPPROVAL11111QUEUE02
      - 01KFAKEAPPROVAL11111QUEUE03

# These 10 unique cases are amplified by `repeat` in the runner to reach
# the configured target N (default 100). Each repetition uses fresh fake IDs
# generated by the runner so no two repetitions share the same fake set.
